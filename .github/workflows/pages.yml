name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build static site
        env:
          # Project Pages: https://osagovrn.github.io/motorent36/
          # Со своим доменом: задайте vars NEXT_PUBLIC_BASE_PATH="" и SITE_URL=https://домен
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_YANDEX_METRIKA_ID: ${{ vars.NEXT_PUBLIC_YANDEX_METRIKA_ID }}
          NEXT_PUBLIC_YANDEX_VERIFICATION: ${{ vars.NEXT_PUBLIC_YANDEX_VERIFICATION }}
        run: |
          export NEXT_PUBLIC_BASE_PATH="${NEXT_PUBLIC_BASE_PATH:-/motorent36}"
          export NEXT_PUBLIC_SITE_URL="${NEXT_PUBLIC_SITE_URL:-https://osagovrn.github.io/motorent36}"
          echo "BASE_PATH=$NEXT_PUBLIC_BASE_PATH"
          echo "SITE_URL=$NEXT_PUBLIC_SITE_URL"
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
